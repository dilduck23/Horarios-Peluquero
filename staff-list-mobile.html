<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/images/favicon-32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="assets/images/apple-touch-icon.png">
    <link rel="manifest" href="site.webmanifest">
    <meta name="theme-color" content="#E85D75">
    <title>Listado de Staff | StaffPlanner</title>

    <!-- Tailwind & Dependencies -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        * {
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f8fafc;
            min-height: 100vh;
            overscroll-behavior: none;
        }

        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .staff-card {
            transition: all 0.2s ease;
        }

        .staff-card:active {
            transform: scale(0.98);
        }

        .staff-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            padding: 16px;
        }

        .staff-pin-chip {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            border-radius: 999px;
            background: #111827;
            color: #fff;
            font-size: 11px;
            font-weight: 900;
            line-height: 1;
            padding: 6px 8px;
        }

        .staff-pin-chip code {
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
            font-size: 12px;
            letter-spacing: 0.08em;
        }

        @media (min-width: 768px) {
            .staff-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }

        @media (min-width: 1280px) {
            .staff-grid {
                grid-template-columns: repeat(3, minmax(0, 1fr));
            }
        }

        @keyframes shimmer {
            0% {
                background-position: -200% 0;
            }

            100% {
                background-position: 200% 0;
            }
        }

        .skeleton {
            background: linear-gradient(90deg, #e2e8f0 25%, #f1f5f9 50%, #e2e8f0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
    </style>
    <link rel="stylesheet" href="css/mobile-app.css">
</head>

<body class="text-slate-800">

    <!-- SUPABASE CLIENT -->
    <script src="js/app-core.js"></script>
    <script>
        const db = window.StaffPlanner.db;
    </script>

    <!-- MAIN APP -->
    <div id="mainApp" class="min-h-screen flex flex-col">

        <!-- Header -->
        <header class="sticky top-0 z-50 bg-white border-b border-slate-100 px-4 py-3 shadow-sm">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <a href="index.html"
                        class="w-10 h-10 bg-slate-100 hover:bg-slate-200 rounded-xl flex items-center justify-center transition-colors">
                        <span class="material-icons text-slate-600">arrow_back</span>
                    </a>
                    <div>
                        <h1 class="app-page-title text-xl">Datos</h1>
                        <p id="pageSubtitle" class="app-page-subtitle">Impulsadoras y marcas</p>
                        <p id="staffCount" class="text-xs text-slate-400">Cargando...</p>
                    </div>
                </div>

                <!-- Add Button (Admin only) -->
                <button onclick="app.openAddStaffModal()" id="addStaffBtn"
                    class="hidden w-10 h-10 bg-gradient-to-r from-green-500 to-emerald-500 rounded-xl flex items-center justify-center shadow-lg hover:shadow-xl transition-all active:scale-95">
                    <span class="material-icons text-white">person_add</span>
                </button>
            </div>

            <!-- Search Input -->
            <div class="relative mt-3">
                <span
                    class="material-icons absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-lg">search</span>
                <input type="text" id="searchInput" placeholder="Buscar por nombre, marca, proveedor o PIN..."
                    oninput="app.onSearchChange()"
                    class="w-full pl-10 pr-4 py-2 bg-slate-100 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-indigo-400 focus:border-indigo-400">
            </div>

            <div class="mt-3 grid grid-cols-2 gap-2 rounded-2xl bg-slate-100 p-1">
                <button id="staffTabBtn" type="button" onclick="app.setTab('staff')"
                    class="py-2 px-3 rounded-xl text-xs font-bold transition-colors bg-white text-slate-900 shadow-sm">
                    Impulsadoras
                </button>
                <button id="catalogTabBtn" type="button" onclick="app.setTab('catalog')"
                    class="py-2 px-3 rounded-xl text-xs font-bold transition-colors text-slate-500">
                    Marcas/Proveedores
                </button>
            </div>
        </header>

        <!-- Staff List -->
        <main id="staffList" class="flex-1 overflow-y-auto bg-slate-50">
            <!-- Loading Skeletons -->
            <div class="p-4 space-y-3">
                <div class="skeleton h-20 rounded-xl"></div>
                <div class="skeleton h-20 rounded-xl"></div>
                <div class="skeleton h-20 rounded-xl"></div>
            </div>
        </main>
    </div>

    <!-- JAVASCRIPT APP LOGIC -->
    <script>
        const app = {
            state: {
                roleId: 0,
                user: null,
                activeTab: 'staff',
                searchQuery: '',
                staff: [],
                categorias: [],
                brandCatalog: [],
                filteredStaff: []
            },

            init: async () => {
                // Auth check
                if (sessionStorage.getItem('staffPlannerAuth') !== 'true') {
                    window.location.href = 'login.html';
                    return;
                }

                const roleId = StaffPlanner.getRoleId();
                app.state.roleId = roleId;
                app.state.user = JSON.parse(sessionStorage.getItem('staffPlannerUser') || '{}');

                // Show add button for Admin only
                if (roleId === 1) {
                    document.getElementById('addStaffBtn').classList.remove('hidden');
                    document.getElementById('addStaffBtn').classList.add('flex');
                }

                await app.loadData();
            },

            loadData: async () => {
                try {
                    const [staffRes, categoriasRes, brandCatalogRes] = await Promise.all([
                        db.from('Tiendas_Impulsadoras').select('*').order('nombre_completo'),
                        db.from('Tiendas_Categorias').select('*'),
                        db.from(StaffPlanner.tables.brandCatalog).select('*').eq('activo', true).order('marca')
                    ]);

                    app.state.staff = staffRes.data || [];
                    app.state.categorias = categoriasRes.data || [];
                    app.state.brandCatalog = brandCatalogRes.data || [];

                    app.renderCurrentTab();

                } catch (err) {
                    console.error('Error loading data:', err);
                    Swal.fire('Error', 'No se pudieron cargar los datos', 'error');
                }
            },

            onSearchChange: () => {
                app.state.searchQuery = document.getElementById('searchInput').value.toLowerCase().trim();
                app.renderCurrentTab();
            },

            setTab: (tab) => {
                app.state.activeTab = tab;
                app.state.searchQuery = '';
                const searchInput = document.getElementById('searchInput');
                if (searchInput) searchInput.value = '';
                app.renderCurrentTab();
            },

            renderCurrentTab: () => {
                app.applyFilters();
                app.renderTabs();
                if (app.state.activeTab === 'catalog') {
                    app.renderProviderList();
                    return;
                }
                app.renderStaffList();
            },

            renderTabs: () => {
                const isCatalog = app.state.activeTab === 'catalog';
                document.getElementById('pageSubtitle').textContent = isCatalog
                    ? 'Proveedores, marcas y correos'
                    : 'Impulsadoras y marcas';
                document.getElementById('searchInput').placeholder = isCatalog
                    ? 'Buscar proveedor, marca o correo...'
                    : 'Buscar por nombre, marca, proveedor o PIN...';

                document.getElementById('staffTabBtn').className = isCatalog
                    ? 'py-2 px-3 rounded-xl text-xs font-bold transition-colors text-slate-500'
                    : 'py-2 px-3 rounded-xl text-xs font-bold transition-colors bg-white text-slate-900 shadow-sm';
                document.getElementById('catalogTabBtn').className = isCatalog
                    ? 'py-2 px-3 rounded-xl text-xs font-bold transition-colors bg-white text-slate-900 shadow-sm'
                    : 'py-2 px-3 rounded-xl text-xs font-bold transition-colors text-slate-500';

                const addButton = document.getElementById('addStaffBtn');
                const canAddStaff = app.state.roleId === 1 && !isCatalog;
                addButton.classList.toggle('hidden', !canAddStaff);
                addButton.classList.toggle('flex', canAddStaff);
            },

            applyFilters: () => {
                const search = app.state.searchQuery;

                app.state.filteredStaff = app.state.staff.filter(s => {
                    if (!search) return true;
                    const name = (s.nombre_completo || '').toLowerCase();
                    const marca = (s.Marca || '').toLowerCase();
                    const proveedor = (s.Proveedor || '').toLowerCase();
                    const codigo = String(s.idVendedor || '').toLowerCase();
                    const pin = String(s.pin || s.PIN || '').toLowerCase();
                    return name.includes(search) || marca.includes(search) || proveedor.includes(search) || codigo.includes(search) || pin.includes(search);
                });
            },

            getCategory: (catId) => {
                return app.state.categorias.find(c => c.id === catId);
            },

            escapeHtml: (value) => String(value ?? '').replace(/[&<>"']/g, (char) => ({
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            }[char])),

            normalizeText: (value) => String(value || '')
                .normalize('NFD')
                .replace(/[\u0300-\u036f]/g, '')
                .trim()
                .replace(/\s+/g, ' ')
                .toLowerCase(),

            usefulValue: (value) => {
                const text = String(value ?? '').trim();
                return text && text !== '0' ? text : '';
            },

            getBrandByIdMarca: (idMarca) => {
                const id = parseInt(idMarca, 10);
                if (!id) return null;
                return app.state.brandCatalog.find(brand => parseInt(brand.idMarca, 10) === id) || null;
            },

            getUniqueBrandByName: (name) => {
                const normalized = app.normalizeText(name);
                if (!normalized) return null;
                const matches = app.state.brandCatalog.filter(brand => app.normalizeText(brand.marca) === normalized);
                return matches.length === 1 ? matches[0] : null;
            },

            getPersonBrand: (person) => {
                return app.getBrandByIdMarca(person?.idMarca) || app.getUniqueBrandByName(person?.Marca);
            },

            brandLabel: (brand) => `${brand.marca || 'Sin marca'} - ${brand.proveedor || 'Sin proveedor'} (#${brand.idMarca})`,

            brandOptionsHtml: () => app.state.brandCatalog
                .map(brand => `<option value="${app.escapeHtml(app.brandLabel(brand))}"></option>`)
                .join(''),

            resolveBrandInput: (value) => {
                const rawValue = String(value || '').trim();
                if (!rawValue) return null;

                const idMatch = rawValue.match(/#(\d+)/);
                if (idMatch) {
                    return app.getBrandByIdMarca(idMatch[1]);
                }

                const normalizedValue = app.normalizeText(rawValue);
                const labelMatch = app.state.brandCatalog.find(brand => app.normalizeText(app.brandLabel(brand)) === normalizedValue);
                if (labelMatch) return labelMatch;

                return app.getUniqueBrandByName(rawValue);
            },

            brandFormHtml: (person = {}) => {
                const brand = app.getPersonBrand(person);
                const initialBrand = brand ? app.brandLabel(brand) : '';
                const fallbackProvider = app.usefulValue(person.Proveedor);
                const providerText = brand?.proveedor || fallbackProvider || 'Selecciona una marca registrada';
                const emailValue = brand ? app.getProviderEmail(brand.idProveedor) : app.usefulValue(person.Correo);

                return `
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1">Marca registrada *</label>
                        <input type="text" id="swal-brand-search" list="swal-brand-options" class="w-full p-3 border rounded-xl" value="${app.escapeHtml(initialBrand)}" placeholder="Buscar marca o proveedor">
                        <datalist id="swal-brand-options">${app.brandOptionsHtml()}</datalist>
                        <div id="swal-brand-provider" class="mt-2 rounded-xl bg-slate-50 border border-slate-100 px-3 py-2 text-xs text-slate-500">${app.escapeHtml(providerText)}</div>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1">Correo del proveedor</label>
                        <input type="email" id="swal-correo" class="w-full p-3 border rounded-xl" value="${app.escapeHtml(emailValue)}" placeholder="correo@proveedor.com">
                    </div>
                `;
            },

            bindBrandPicker: () => {
                const input = document.getElementById('swal-brand-search');
                const providerEl = document.getElementById('swal-brand-provider');
                const emailInput = document.getElementById('swal-correo');
                if (!input || !providerEl || !emailInput) return;

                const renderBrand = () => {
                    const brand = app.resolveBrandInput(input.value);
                    if (!brand) {
                        providerEl.textContent = 'Elige una marca de la lista para asociar proveedor e IDs internos.';
                        providerEl.className = 'mt-2 rounded-xl bg-amber-50 border border-amber-100 px-3 py-2 text-xs text-amber-700';
                        return;
                    }

                    providerEl.innerHTML = `
                        <div class="font-bold text-slate-700">${app.escapeHtml(brand.proveedor || 'Sin proveedor')}</div>
                        <div>ID marca ${app.escapeHtml(brand.idMarca)} · ID proveedor ${app.escapeHtml(brand.idProveedor)}</div>
                    `;
                    providerEl.className = 'mt-2 rounded-xl bg-emerald-50 border border-emerald-100 px-3 py-2 text-xs text-emerald-700';

                    const providerEmail = app.getProviderEmail(brand.idProveedor);
                    if (providerEmail) {
                        emailInput.value = providerEmail;
                    }
                };

                input.addEventListener('input', renderBrand);
                renderBrand();
            },

            readBrandSelection: () => {
                const brandInput = document.getElementById('swal-brand-search');
                const emailInput = document.getElementById('swal-correo');
                const brand = app.resolveBrandInput(brandInput?.value);
                const correo = (emailInput?.value || '').trim();

                if (!brand) {
                    Swal.showValidationMessage('Selecciona una marca registrada de la lista.');
                    return null;
                }

                if (correo && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(correo)) {
                    Swal.showValidationMessage('El correo del proveedor no es válido.');
                    return null;
                }

                return { brand, correo };
            },

            promoterBrandPayload: (brand, correo) => ({
                Marca: brand.marca || null,
                idMarca: parseInt(brand.idMarca, 10) || null,
                Proveedor: brand.proveedor || null,
                idProveedor: parseInt(brand.idProveedor, 10) || null,
                Correo: correo || app.getProviderEmail(brand.idProveedor) || brand.correo_proveedor || null
            }),

            getProviderEmail: (idProveedor) => {
                const providerId = parseInt(idProveedor, 10);
                if (!providerId) return '';

                const catalogEmail = app.state.brandCatalog
                    .filter(brand => parseInt(brand.idProveedor, 10) === providerId)
                    .map(brand => app.usefulValue(brand.correo_proveedor))
                    .find(Boolean);

                if (catalogEmail) return catalogEmail;

                const staffEmails = [...new Set(app.state.staff
                    .filter(person => parseInt(person.idProveedor, 10) === providerId)
                    .map(person => app.usefulValue(person.Correo))
                    .filter(Boolean)
                )];

                return staffEmails.length === 1 ? staffEmails[0] : '';
            },

            providerGroups: () => {
                const groups = new Map();

                app.state.brandCatalog.forEach(brand => {
                    const providerId = parseInt(brand.idProveedor, 10);
                    if (!providerId) return;

                    if (!groups.has(providerId)) {
                        groups.set(providerId, {
                            idProveedor: providerId,
                            proveedor: brand.proveedor || 'Sin proveedor',
                            correo: app.getProviderEmail(providerId),
                            marcas: [],
                            staffEmails: new Set()
                        });
                    }

                    groups.get(providerId).marcas.push({
                        idMarca: brand.idMarca,
                        marca: brand.marca
                    });
                });

                app.state.staff.forEach(person => {
                    const providerId = parseInt(person.idProveedor, 10);
                    const email = app.usefulValue(person.Correo);
                    if (providerId && email && groups.has(providerId)) {
                        groups.get(providerId).staffEmails.add(email);
                    }
                });

                return [...groups.values()]
                    .map(group => ({
                        ...group,
                        marcas: group.marcas.sort((a, b) => String(a.marca).localeCompare(String(b.marca), 'es')),
                        staffEmails: [...group.staffEmails]
                    }))
                    .sort((a, b) => a.proveedor.localeCompare(b.proveedor, 'es'));
            },

            syncProviderEmail: async (idProveedor, correo) => {
                if (!idProveedor || !correo) return;
                const timestamp = new Date().toISOString();
                const { error } = await db.from(StaffPlanner.tables.brandCatalog)
                    .update({ correo_proveedor: correo, actualizado_en: timestamp })
                    .eq('idProveedor', idProveedor);

                if (error) {
                    console.warn('No se pudo sincronizar correo del proveedor:', error);
                    return;
                }

                const { error: staffError } = await db.from('Tiendas_Impulsadoras')
                    .update({ Correo: correo })
                    .eq('idProveedor', idProveedor);

                if (staffError) {
                    console.warn('No se pudo sincronizar correo en impulsadoras:', staffError);
                }

                app.state.brandCatalog = app.state.brandCatalog.map(brand => (
                    parseInt(brand.idProveedor, 10) === parseInt(idProveedor, 10)
                        ? { ...brand, correo_proveedor: correo, actualizado_en: timestamp }
                        : brand
                ));

                app.state.staff = app.state.staff.map(person => (
                    parseInt(person.idProveedor, 10) === parseInt(idProveedor, 10)
                        ? { ...person, Correo: correo }
                        : person
                ));
            },

            renderProviderList: () => {
                const container = document.getElementById('staffList');
                const search = app.state.searchQuery;
                const allProviders = app.providerGroups();
                const providers = allProviders.filter(provider => {
                    if (!search) return true;
                    const haystack = [
                        provider.proveedor,
                        provider.idProveedor,
                        provider.correo,
                        provider.marcas.map(brand => `${brand.marca} ${brand.idMarca}`).join(' '),
                        provider.staffEmails.join(' ')
                    ].join(' ').toLowerCase();
                    return haystack.includes(search);
                });

                document.getElementById('staffCount').textContent = search
                    ? `${providers.length} de ${allProviders.length} proveedores`
                    : `${allProviders.length} proveedores`;

                if (providers.length === 0) {
                    container.innerHTML = `
                        <div class="text-center py-16">
                            <span class="material-icons text-5xl text-slate-300 mb-3">inventory_2</span>
                            <p class="text-slate-400 font-medium">No se encontraron proveedores</p>
                        </div>`;
                    return;
                }

                container.innerHTML = `
                    <div class="p-4 space-y-3">
                        ${providers.map(provider => {
                            const brandsPreview = provider.marcas.slice(0, 8).map(brand => `
                                <span class="inline-flex items-center rounded-full bg-slate-100 px-2 py-1 text-[11px] font-bold text-slate-600">
                                    ${app.escapeHtml(brand.marca)} #${app.escapeHtml(brand.idMarca)}
                                </span>
                            `).join('');
                            const extraBrands = provider.marcas.length > 8
                                ? `<span class="text-[11px] font-bold text-slate-400">+${provider.marcas.length - 8} marcas</span>`
                                : '';
                            const existingEmails = provider.staffEmails.filter(email => email !== provider.correo);

                            return `
                                <article class="bg-white rounded-xl p-4 shadow-sm border border-slate-100">
                                    <div class="flex items-start gap-3">
                                        <div class="w-11 h-11 rounded-xl bg-emerald-50 text-emerald-700 flex items-center justify-center font-black">
                                            ${(provider.proveedor || 'P').substring(0, 1).toUpperCase()}
                                        </div>
                                        <div class="flex-1 min-w-0">
                                            <div class="font-black text-slate-800 leading-tight">${app.escapeHtml(provider.proveedor)}</div>
                                            <div class="text-xs text-slate-400">ID proveedor ${app.escapeHtml(provider.idProveedor)} · ${provider.marcas.length} marcas</div>
                                        </div>
                                    </div>
                                    <div class="mt-3 flex flex-wrap gap-1.5">
                                        ${brandsPreview}
                                        ${extraBrands}
                                    </div>
                                    <div class="mt-3">
                                        <label class="block text-xs font-bold text-slate-500 mb-1">Correo del proveedor</label>
                                        <div class="flex gap-2">
                                            <input id="provider-email-${provider.idProveedor}" type="email" class="min-w-0 flex-1 p-3 border rounded-xl text-sm" value="${app.escapeHtml(provider.correo)}" placeholder="correo@proveedor.com">
                                            <button type="button" onclick="app.saveProviderEmail(${provider.idProveedor})" class="px-3 rounded-xl bg-[#E85D75] text-white font-bold text-xs">
                                                Guardar
                                            </button>
                                        </div>
                                        ${existingEmails.length ? `<p class="mt-2 text-[11px] text-amber-600">Correos usados actualmente: ${app.escapeHtml(existingEmails.join(', '))}</p>` : ''}
                                    </div>
                                </article>
                            `;
                        }).join('')}
                    </div>
                `;
            },

            saveProviderEmail: async (idProveedor) => {
                const input = document.getElementById(`provider-email-${idProveedor}`);
                const correo = (input?.value || '').trim();

                if (!correo || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(correo)) {
                    Swal.fire('Correo inválido', 'Escribe un correo válido para el proveedor.', 'warning');
                    return;
                }

                Swal.fire({
                    title: 'Guardando correo',
                    allowOutsideClick: false,
                    didOpen: () => Swal.showLoading()
                });

                await app.syncProviderEmail(idProveedor, correo);
                Swal.fire({ icon: 'success', title: 'Correo actualizado', timer: 1400, showConfirmButton: false });
                app.renderCurrentTab();
            },

            generatePin: () => {
                const existingPins = new Set(app.state.staff.map(person => app.usefulValue(person.pin)).filter(Boolean));
                for (let attempt = 0; attempt < 100; attempt += 1) {
                    let value;
                    if (window.crypto?.getRandomValues) {
                        const buffer = new Uint32Array(1);
                        window.crypto.getRandomValues(buffer);
                        value = String(buffer[0] % 10000).padStart(4, '0');
                    } else {
                        value = String(Math.floor(Math.random() * 10000)).padStart(4, '0');
                    }
                    if (!existingPins.has(value)) return value;
                }

                return String(Date.now() % 10000).padStart(4, '0');
            },

            refreshGeneratedPin: () => {
                const input = document.getElementById('swal-pin');
                const display = document.getElementById('swal-pin-display');
                const pin = app.generatePin();
                if (input) input.value = pin;
                if (display) display.textContent = pin;
            },

            renderStaffList: () => {
                const container = document.getElementById('staffList');
                const staff = app.state.filteredStaff;
                const total = app.state.staff.length;
                const filtered = staff.length;

                document.getElementById('staffCount').textContent =
                    app.state.searchQuery
                        ? `${filtered} de ${total} personas`
                        : `${total} personas`;

                if (staff.length === 0) {
                    container.innerHTML = `
                        <div class="text-center py-16">
                            <span class="material-icons text-5xl text-slate-300 mb-3">person_off</span>
                            <p class="text-slate-400 font-medium">No se encontró personal</p>
                        </div>`;
                    return;
                }

                let html = '<div class="staff-grid">';

                staff.forEach(person => {
                    const category = app.getCategory(person.idCategoria);
                    const isActive = StaffPlanner.isActiveImpulsadora(person);
                    const providerName = app.usefulValue(person.Proveedor);
                    const pin = app.usefulValue(person.pin || person.PIN);
                    const categoryBadge = category
                        ? `<span class="px-2 py-0.5 rounded-full text-[10px] font-bold ${category.id_zona === 1 ? 'bg-blue-100 text-blue-700' : 'bg-amber-100 text-amber-700'}">${category.descripcion || 'Sin cat.'}</span>`
                        : '';

                    html += `
                        <div class="staff-card bg-white rounded-xl p-4 shadow-sm border border-slate-100 h-full ${!isActive ? 'opacity-50' : ''}"
                             onclick="app.showStaffDetails(${person.id})">
                            <div class="flex items-center gap-3 h-full">
                                <!-- Avatar -->
                                <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center text-white font-bold text-lg flex-shrink-0">
                                    ${(person.nombre_completo || 'S').substring(0, 1).toUpperCase()}
                                </div>
                                
                                <!-- Info -->
                                <div class="flex-1 min-w-0">
                                    <div class="font-bold text-slate-800 truncate">${person.nombre_completo || 'Sin nombre'}</div>
                                    <div class="mt-1">
                                        <span class="staff-pin-chip">PIN <code>${pin || '-'}</code></span>
                                    </div>
                                    <div class="flex items-center gap-2 flex-wrap">
                                        <span class="text-xs text-slate-400">${person.idVendedor || ''}</span>
                                        ${person.Marca ? `<span class="text-xs text-slate-500">• ${person.Marca}</span>` : ''}
                                        ${providerName ? `<span class="text-xs text-slate-400">• ${providerName}</span>` : ''}
                                    </div>
                                </div>

                                <!-- Status/Category -->
                                <div class="flex flex-col items-end gap-1">
                                    ${categoryBadge}
                                    <span class="text-[10px] font-bold ${isActive ? 'text-green-600' : 'text-red-500'}">${isActive ? 'Activo' : 'Inactivo'}</span>
                                </div>

                                <span class="material-icons text-slate-300 text-sm">chevron_right</span>
                            </div>
                        </div>`;
                });

                html += '</div>';
                container.innerHTML = html;
            },

            showStaffDetails: (personId) => {
                const person = app.state.staff.find(s => s.id === personId);
                if (!person) return;

                const category = app.getCategory(person.idCategoria);
                const isActive = StaffPlanner.isActiveImpulsadora(person);
                const roleId = app.state.roleId;
                const brand = app.getPersonBrand(person);
                const providerName = app.usefulValue(person.Proveedor) || brand?.proveedor || '-';
                const brandId = app.usefulValue(person.idMarca) || brand?.idMarca || '-';
                const providerId = app.usefulValue(person.idProveedor) || brand?.idProveedor || '-';

                let actionsHtml = '';

                // Admin/Organizador can edit
                if (roleId === 1 || roleId === 2) {
                    actionsHtml = `
                        <button onclick="app.editStaff(${person.id})" 
                            class="w-full py-3 px-4 bg-blue-500 hover:bg-blue-600 text-white rounded-xl font-semibold flex items-center justify-center gap-2 transition-all">
                            <span class="material-icons text-base">edit</span> Editar
                        </button>
                        <button onclick="app.toggleStaffStatus(${person.id}, ${isActive})" 
                            class="w-full py-3 px-4 ${isActive ? 'bg-red-500 hover:bg-red-600' : 'bg-green-500 hover:bg-green-600'} text-white rounded-xl font-semibold flex items-center justify-center gap-2 transition-all">
                            <span class="material-icons text-base">${isActive ? 'block' : 'check_circle'}</span> ${isActive ? 'Deshabilitar' : 'Habilitar'}
                        </button>
                    `;
                }

                Swal.fire({
                    title: person.nombre_completo || 'Sin nombre',
                    html: `
                        <div class="text-left space-y-3">
                            <div class="bg-slate-800 p-3 rounded-lg">
                                <div class="text-xs text-slate-400">🔐 PIN</div>
                                <div class="font-bold text-white font-mono text-lg">${person.pin || '-'}</div>
                            </div>
                            <div class="bg-slate-50 p-3 rounded-lg">
                                <div class="text-xs text-slate-400">Código de venta</div>
                                <div class="font-medium text-slate-700">${person.idVendedor || '-'}</div>
                            </div>
                            <div class="bg-slate-50 p-3 rounded-lg">
                                <div class="text-xs text-slate-400">Marca</div>
                                <div class="font-medium text-slate-700">${person.Marca || '-'}</div>
                            </div>
                            <div class="bg-slate-50 p-3 rounded-lg">
                                <div class="text-xs text-slate-400">Proveedor</div>
                                <div class="font-medium text-slate-700">${providerName}</div>
                                <div class="text-[11px] text-slate-400 mt-1">ID marca: ${brandId} · ID proveedor: ${providerId}</div>
                            </div>
                            <div class="bg-slate-50 p-3 rounded-lg">
                                <div class="text-xs text-slate-400">Categoría</div>
                                <div class="font-medium text-slate-700">${category?.descripcion || '-'}</div>
                            </div>
                            <div class="bg-slate-50 p-3 rounded-lg">
                                <div class="text-xs text-slate-400">Correo</div>
                                <div class="font-medium text-slate-700">${person.Correo || '-'}</div>
                            </div>
                            <div class="bg-slate-50 p-3 rounded-lg">
                                <div class="text-xs text-slate-400">Estado</div>
                                <div class="font-bold ${isActive ? 'text-green-600' : 'text-red-500'}">${isActive ? 'Activo' : 'Inactivo'}</div>
                            </div>
                        </div>
                        ${actionsHtml ? `<div class="space-y-3 mt-4">${actionsHtml}</div>` : ''}
                    `,
                    showConfirmButton: false,
                    showCloseButton: true,
                    customClass: {
                        popup: 'rounded-2xl'
                    }
                });
            },

            editStaff: async (personId) => {
                Swal.close();
                const person = app.state.staff.find(s => s.id === personId);
                if (!person) return;

                const categoryOptions = app.state.categorias.map(c =>
                    `<option value="${c.id}" ${c.id === person.idCategoria ? 'selected' : ''}>${c.descripcion}</option>`
                ).join('');

                const { value: formValues } = await Swal.fire({
                    title: 'Editar Personal',
                    html: `
                        <div class="text-left space-y-3">
                            <div class="bg-slate-100 p-3 rounded-xl">
                                <label class="block text-xs font-bold text-slate-500 mb-1">🔐 PIN (no editable)</label>
                                <div class="font-mono font-bold text-slate-800">${person.pin || '-'}</div>
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-slate-500 mb-1">Nombre Completo</label>
                                <input type="text" id="swal-nombre" class="w-full p-3 border rounded-xl" value="${person.nombre_completo || ''}">
                            </div>
                            ${app.brandFormHtml(person)}
                            <div>
                                <label class="block text-xs font-bold text-slate-500 mb-1">Categoría</label>
                                <select id="swal-categoria" class="w-full p-3 border rounded-xl">
                                    <option value="">Sin categoría</option>
                                    ${categoryOptions}
                                </select>
                            </div>
                        </div>
                    `,
                    showCancelButton: true,
                    confirmButtonText: 'Guardar',
                    cancelButtonText: 'Cancelar',
                    confirmButtonColor: '#6366f1',
                    didOpen: app.bindBrandPicker,
                    preConfirm: () => {
                        const brandSelection = app.readBrandSelection();
                        if (!brandSelection) return false;

                        return {
                            data: {
                                nombre_completo: document.getElementById('swal-nombre').value,
                                ...app.promoterBrandPayload(brandSelection.brand, brandSelection.correo),
                                idCategoria: parseInt(document.getElementById('swal-categoria').value) || null
                            },
                            providerId: brandSelection.brand.idProveedor,
                            providerEmail: brandSelection.correo
                        };
                    }
                });

                if (formValues) {
                    const { error } = await db.from('Tiendas_Impulsadoras')
                        .update(formValues.data)
                        .eq('id', personId);

                    if (error) {
                        Swal.fire('Error', error.message, 'error');
                    } else {
                        await app.syncProviderEmail(formValues.providerId, formValues.providerEmail);
                        Swal.fire({ icon: 'success', title: '¡Guardado!', timer: 1500, showConfirmButton: false });
                        await app.loadData();
                    }
                }
            },

            toggleStaffStatus: async (personId, currentStatus) => {
                Swal.close();

                const action = currentStatus ? 'deshabilitar' : 'habilitar';
                const result = await Swal.fire({
                    title: `¿${currentStatus ? 'Deshabilitar' : 'Habilitar'} este personal?`,
                    icon: 'question',
                    showCancelButton: true,
                    confirmButtonText: `Sí, ${action}`,
                    cancelButtonText: 'Cancelar',
                    confirmButtonColor: currentStatus ? '#ef4444' : '#10b981'
                });

                if (result.isConfirmed) {
                    const { error } = await db.from('Tiendas_Impulsadoras')
                        .update({ Habilitado: !currentStatus })
                        .eq('id', personId);

                    if (error) {
                        Swal.fire('Error', error.message, 'error');
                    } else {
                        Swal.fire({ icon: 'success', title: `¡${currentStatus ? 'Deshabilitado' : 'Habilitado'}!`, timer: 1500, showConfirmButton: false });
                        await app.loadData();
                    }
                }
            },

            openAddStaffModal: async () => {
                const categoryOptions = app.state.categorias.map(c =>
                    `<option value="${c.id}">${c.descripcion}</option>`
                ).join('');
                const generatedPin = app.generatePin();

                const { value: formValues } = await Swal.fire({
                    title: 'Agregar Personal',
                    html: `
                        <div class="text-left space-y-3">
                            <div>
                                <label class="block text-xs font-bold text-slate-500 mb-1">Nombre Completo *</label>
                                <input type="text" id="swal-nombre" class="w-full p-3 border rounded-xl" placeholder="Nombre completo">
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-slate-500 mb-1">Código de venta *</label>
                                <input type="text" id="swal-codigo" class="w-full p-3 border rounded-xl" placeholder="Código de venta" inputmode="numeric">
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-slate-500 mb-1">PIN automático</label>
                                <input type="hidden" id="swal-pin" value="${generatedPin}">
                                <div class="flex items-center gap-2">
                                    <div id="swal-pin-display" class="flex-1 rounded-xl border border-slate-200 bg-slate-50 p-3 font-mono text-lg font-black tracking-[0.3em] text-slate-800">${generatedPin}</div>
                                    <button type="button" onclick="app.refreshGeneratedPin()" class="w-12 h-12 rounded-xl bg-slate-900 text-white flex items-center justify-center">
                                        <span class="material-icons text-base">sync</span>
                                    </button>
                                </div>
                            </div>
                            ${app.brandFormHtml()}
                            <div>
                                <label class="block text-xs font-bold text-slate-500 mb-1">Categoría</label>
                                <select id="swal-categoria" class="w-full p-3 border rounded-xl">
                                    <option value="">Sin categoría</option>
                                    ${categoryOptions}
                                </select>
                            </div>
                        </div>
                    `,
                    showCancelButton: true,
                    confirmButtonText: '✅ Agregar',
                    cancelButtonText: 'Cancelar',
                    confirmButtonColor: '#10b981',
                    didOpen: app.bindBrandPicker,
                    preConfirm: () => {
                        const nombre = document.getElementById('swal-nombre').value.trim();
                        const codigo = document.getElementById('swal-codigo').value.trim();
                        const pin = document.getElementById('swal-pin').value.trim();
                        const brandSelection = app.readBrandSelection();

                        if (!nombre || !/^\d+$/.test(codigo) || !/^\d{4}$/.test(pin)) {
                            Swal.showValidationMessage('Nombre y código numérico son requeridos. El PIN se genera automáticamente.');
                            return false;
                        }

                        if (!brandSelection) return false;

                        return {
                            data: {
                                nombre_completo: nombre,
                                idVendedor: parseInt(codigo, 10),
                                pin,
                                ...app.promoterBrandPayload(brandSelection.brand, brandSelection.correo),
                                idCategoria: parseInt(document.getElementById('swal-categoria').value) || null,
                                Habilitado: true
                            },
                            providerId: brandSelection.brand.idProveedor,
                            providerEmail: brandSelection.correo
                        };
                    }
                });

                if (formValues) {
                    const { error } = await db.from('Tiendas_Impulsadoras').insert(formValues.data);

                    if (error) {
                        Swal.fire('Error', error.message, 'error');
                    } else {
                        await app.syncProviderEmail(formValues.providerId, formValues.providerEmail);
                        Swal.fire({ icon: 'success', title: '¡Personal agregado!', timer: 1500, showConfirmButton: false });
                        await app.loadData();
                    }
                }
            }
        };

        document.addEventListener('DOMContentLoaded', app.init);
    </script>
</body>

</html>

<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/images/favicon-32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="assets/images/apple-touch-icon.png">
    <link rel="manifest" href="site.webmanifest">
    <meta name="theme-color" content="#E85D75">
    <title>Mi Horario | Novepsa Planner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/mobile-app.css">
    <style>
        .secure-text {
            -webkit-text-security: disc;
            text-security: disc;
            font-family: text-security-disc;
        }
    </style>
</head>

<body class="text-slate-800">
    <script src="js/app-core.js"></script>

    <div id="loginOverlay" class="fixed inset-0 bg-[#f7f4f2] z-[99999] flex items-center justify-center p-6">
        <div class="app-login-card bg-white p-6 rounded-3xl w-full max-w-sm text-center" id="loginCard">
            <div class="text-left mb-3">
                <img src="assets/images/logo-novepsa-sf-negro.png" alt="Novepsa" class="app-logo">
            </div>
            <img src="assets/images/icono-logo.png" alt="" class="app-mascot mb-3">
            <h2 class="text-2xl font-black text-slate-900 mb-2">Mi Horario</h2>
            <p class="text-slate-500 mb-6 text-sm">Ingresa tu PIN para ver tu calendario</p>
            <input type="text" id="loginPin"
                class="secure-text w-full text-center text-4xl tracking-[0.5em] font-mono bg-slate-100 p-4 rounded-2xl border-2 border-slate-200 outline-none transition-colors"
                placeholder="••••" maxlength="4" inputmode="numeric" autocomplete="off">
            <button onclick="SelfMobileApp.handlePinLogin()"
                class="w-full bg-[#e85d75] text-white font-bold py-4 rounded-2xl mt-6 transition-all active:scale-[0.98]">
                INGRESAR
            </button>
            <p id="loginError" class="text-red-500 text-sm mt-4 hidden font-medium"></p>
            <a href="login.html" class="block mt-6 text-slate-400 text-xs hover:text-slate-600 underline">
                Acceso Administrador
            </a>
        </div>
    </div>

    <div id="mainApp" class="hidden min-h-screen bg-[#f7f4f2]"></div>

    <script src="js/mobile-self-app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            SelfMobileApp.init();
            const pinInput = document.getElementById('loginPin');
            pinInput.addEventListener('input', (event) => {
                event.target.value = event.target.value.replace(/[^0-9]/g, '');
                if (event.target.value.length === 4) SelfMobileApp.handlePinLogin();
            });
        });
    </script>
</body>

</html>

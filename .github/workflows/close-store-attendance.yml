name: Close Store Attendance

on:
  schedule:
    # 20:00 America/Guayaquil (UTC-5). GitHub puede retrasar algunos minutos.
    - cron: "0 1 * * *"
  workflow_dispatch:
    inputs:
      fecha:
        description: "Fecha Ecuador a cerrar, formato YYYY-MM-DD. Vacio calcula la fecha segura segun hora Ecuador."
        required: false
        type: string

permissions:
  contents: read

jobs:
  close:
    name: Generate automatic absences
    runs-on: ubuntu-latest
    steps:
      - name: Close pending store attendance
        env:
          SUPABASE_URL: https://cectqtufttubsepyiolr.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          FECHA_INPUT: ${{ github.event.inputs.fecha || '' }}
        run: |
          set -euo pipefail

          : "${SUPABASE_SERVICE_ROLE_KEY:?Missing SUPABASE_SERVICE_ROLE_KEY secret}"

          supabase_url="${SUPABASE_URL%/}"
          close_fecha="${FECHA_INPUT}"
          if [ -z "${close_fecha}" ]; then
            ecuador_hour="$(TZ=America/Guayaquil date '+%H')"
            if [ "${ecuador_hour}" -lt 20 ]; then
              close_fecha="$(TZ=America/Guayaquil date -d 'yesterday' '+%F')"
            else
              close_fecha="$(TZ=America/Guayaquil date '+%F')"
            fi
          fi
          body=$(printf '{"fecha":"%s"}' "${close_fecha}")

          echo "Closing store attendance for ${close_fecha}"

          curl --silent --show-error --fail \
            --request POST "${supabase_url}/functions/v1/close-store-attendance" \
            --header "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
            --header "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            --header "Content-Type: application/json" \
            --data "${body}"
